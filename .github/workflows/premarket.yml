name: US Equity Event Radar

on:
  schedule:
    # GitHub Actions cron is UTC. Trigger both DST and standard-time candidates;
    # the app only runs inside the New York 09:00 pre-market window.
    - cron: "0 13 * * 1-5"
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest
      - name: Run event radar
        env:
          AGENT_MODE: event_radar
          EVENT_MAX_ITEMS: "100"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5' }}
          BIGMODEL_API_KEY: ${{ secrets.BIGMODEL_API_KEY }}
          BIGMODEL_MODEL: ${{ vars.BIGMODEL_MODEL || 'glm-4.6v' }}
          WECHAT_PROVIDER: serverchan
          SERVERCHAN_SEND_KEY: ${{ secrets.SERVERCHAN_SEND_KEY }}
          MOOMOO_ENABLED: "false"
          AUTO_TRADING: "false"
          REQUIRE_HUMAN_CONFIRM: "true"
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python main.py --force
          else
            python main.py
          fi
